# cc-vitals tmux config — shipped static, no install-time substitution.
#
# Loaded by `cct` via `tmux -L cc-vitals -f <plugin>/tmux/cc-vitals.tmux.conf`,
# so it runs on a dedicated tmux server isolated from your personal tmux.
# Two env vars must be set in tmux's server env (cct exports them before
# launch):
#   - CC_VITALS_PLUGIN_ROOT   absolute path to the plugin install
#   - CC_VITALS_DUMP_DIR      where ingest publishes manifests (optional;
#                              defaults to ~/.claude/plugin-data/cc-vitals/
#                              published/ when unset)
#
# What this does:
#   - `status 3`: tmux's default bar (window list, status-left/right)
#     stays as row 0; cc-vitals lines render in rows 1 and 2. Each
#     cc-vitals line gets its own row because tmux's `#()` substitution
#     flattens newlines, so multi-line payloads can't share a single row.
#   - `status-interval 1`: re-evaluates `#()` every second, which is how
#     the cache TTL countdown ticks smoothly.
#   - tick.py walks the published manifest for `#{session_name}`, formats
#     any live items (currently just the cache TTL) at this exact moment,
#     and emits tmux markup. The producer is responsible for writing the
#     manifest into CC_VITALS_DUMP_DIR; tick.py is read-only.
#   - Black background overrides tmux's default green (our palette is
#     tuned for a dark backdrop).

set -g status 3
set -g status-style "bg=black,fg=default"
set -g status-interval 1
set -g status-format[1] "#(python3 $CC_VITALS_PLUGIN_ROOT/scripts/tick.py '#{session_name}' 0)"
set -g status-format[2] "#(python3 $CC_VITALS_PLUGIN_ROOT/scripts/tick.py '#{session_name}' 1)"

# Truecolor support — required for the configured palette to render at
# full fidelity. Three lines are load-bearing:
#   1. `default-terminal` sets the *baseline* terminfo for inside the
#      pane. tmux's 3.2 default is `screen` (8 colors), and no number of
#      overrides will promote 8-color to RGB. `tmux-256color` is the
#      normal 256-color baseline that the overrides below can extend.
#   2. `:RGB` is the modern (tmux 3.2+) terminal feature flag.
#   3. `:Tc` is the older capability override; some setups honor one and
#      not the other. Belt-and-suspenders.
# Comment out all three if your outer terminal doesn't advertise RGB.
set -g  default-terminal   "tmux-256color"
set -as terminal-features  ",*:RGB"
set -ga terminal-overrides ",*:Tc"

# Mouse mode: wheel-up auto-enters copy-mode for scrollback so chat
# history scrolls like it does outside tmux. `q` or wheel-down exits.
# Without this, Up Arrow goes straight to CC and recalls previous prompts
# instead of scrolling the visible transcript.
set -g mouse on

# Layering on your personal tmux config: cc-vitals runs on its own
# dedicated server (`-L cc-vitals`), so it does NOT inherit ~/.tmux.conf.
# If you want your personal keybindings, copy-mode prefs, etc. inside the
# cc-vitals tmux session, uncomment the line below. Skip if you're not
# sure what this does — the rest of cc-vitals works without it.
#source-file -q ~/.tmux.conf
